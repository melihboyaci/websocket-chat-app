<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Chat</title>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #36393f;
            color: #dcddde;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Servers Sidebar */
        .servers {
            width: 72px;
            background-color: #202225;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
        }

        .server {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #36393f;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 16px;
        }

        .server:hover,
        .server.active {
            border-radius: 16px;
            background-color: #5865f2;
            color: white;
        }

        /* Channels Sidebar */
        .channels {
            width: 240px;
            background-color: #2f3136;
            display: flex;
            flex-direction: column;
        }

        .server-header {
            height: 48px;
            border-bottom: 2px solid #202225;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            box-shadow: 0 1px 0 rgba(4, 4, 5, 0.2), 0 1.5px 0 rgba(6, 6, 7, 0.05), 0 2px 0 rgba(4, 4, 5, 0.05);
        }

        .channel-list {
            flex: 1;
            padding: 16px 8px;
        }

        .channel-category {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #8e9297;
            margin-bottom: 8px;
            margin-top: 16px;
        }

        .channel-category:first-child {
            margin-top: 0;
        }

        .channel {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            margin: 1px 0;
            border-radius: 4px;
            cursor: pointer;
            color: #8e9297;
            font-size: 16px;
            transition: all 0.15s;
        }

        .channel:hover {
            background-color: #3c3f44;
            color: #dcddde;
        }

        .channel.active {
            background-color: #393c43;
            color: white;
        }

        .channel::before {
            content: '#';
            font-weight: bold;
            color: #8e9297;
            margin-right: 6px;
        }

        .channel.active::before {
            color: white;
        }

        /* User Panel */
        .user-panel {
            height: 52px;
            background-color: #292b2f;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .user-info {
            flex: 1;
        }

        .username {
            font-size: 14px;
            font-weight: 600;
            color: white;
        }

        .user-status {
            font-size: 12px;
            color: #b9bbbe;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #36393f;
        }

        .chat-header {
            height: 48px;
            border-bottom: 1px solid #40444b;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            box-shadow: 0 1px 0 rgba(4, 4, 5, 0.2), 0 1.5px 0 rgba(6, 6, 7, 0.05), 0 2px 0 rgba(4, 4, 5, 0.05);
        }

        .chat-header::before {
            content: '#';
            font-weight: bold;
            color: #8e9297;
            font-size: 24px;
        }

        .channel-name {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        /* Messages Area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 16px;
            padding: 2px 0;
        }

        .message:hover {
            background-color: rgba(4, 4, 5, 0.07);
            margin: 0 -16px;
            padding: 2px 16px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-author {
            font-weight: 500;
            color: white;
            font-size: 16px;
        }

        .message-timestamp {
            font-size: 12px;
            color: #72767d;
        }

        .message-text {
            color: #dcddde;
            line-height: 1.375;
            word-wrap: break-word;
        }

        /* Message Input */
        .message-input-container {
            padding: 16px;
        }

        .message-input-wrapper {
            background-color: #40444b;
            border-radius: 8px;
            padding: 11px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .message-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #dcddde;
            font-size: 16px;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: #72767d;
        }

        .send-button {
            background-color: #5865f2;
            border: none;
            border-radius: 3px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .send-button:hover {
            background-color: #4752c4;
        }

        .send-button:disabled {
            background-color: #4f545c;
            cursor: not-allowed;
        }

        /* Login Modal */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-form {
            background-color: #36393f;
            padding: 32px;
            border-radius: 8px;
            width: 400px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
            color: white;
        }

        .login-subtitle {
            text-align: center;
            color: #b9bbbe;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #b9bbbe;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background-color: #202225;
            border: 1px solid #202225;
            border-radius: 3px;
            padding: 10px;
            color: #dcddde;
            font-size: 16px;
        }

        .form-input:focus {
            outline: none;
            border-color: #5865f2;
        }

        .login-button {
            width: 100%;
            background-color: #5865f2;
            border: none;
            border-radius: 3px;
            padding: 12px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-button:hover {
            background-color: #4752c4;
        }

        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #2e3338;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #202225;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #1e2124;
        }
    </style>
</head>
<body>
    <div id="loginModal" class="login-modal">
        <div class="login-form">
            <h2 class="login-title">Sohbete Katıl</h2>
            <p class="login-subtitle">Kullanıcı adınızı girin</p>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Kullanıcı Adı</label>
                    <input type="text" id="usernameInput" class="form-input" placeholder="Kullanıcı adınızı girin" required>
                </div>
                <button type="submit" class="login-button">Sohbete Katıl</button>
            </form>
        </div>
    </div>

    <div class="app" id="app" style="display: none;">
        <!-- Servers Sidebar -->
        <div class="servers">
            <div class="server active">DS</div>
            <div class="server">G1</div>
            <div class="server">G2</div>
        </div>

        <!-- Channels Sidebar -->
        <div class="channels">
            <div class="server-header">Discord Clone</div>
            <div class="channel-list">
                <div class="channel-category">Metin Kanalları</div>
                <div class="channel active" data-channel="genel">genel</div>
                <div class="channel" data-channel="rastgele">rastgele</div>
                <div class="channel" data-channel="oyun">oyun</div>
            </div>
            <div class="user-panel">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="username" id="displayUsername">Kullanıcı</div>
                    <div class="user-status">Çevrimiçi</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="chat-header">
                <span class="channel-name" id="currentChannelName">genel</span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="message-input-container">
                <div class="message-input-wrapper">
                    <input type="text" class="message-input" id="messageInput" placeholder="#genel kanalına mesaj gönder">
                    <button class="send-button" id="sendButton">Gönder</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        let username = '';
        let currentChannel = 'genel';
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // DOM Elements
        const loginModal = document.getElementById('loginModal');
        const app = document.getElementById('app');
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('usernameInput');
        const messages = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const displayUsername = document.getElementById('displayUsername');
        const userAvatar = document.getElementById('userAvatar');
        const currentChannelName = document.getElementById('currentChannelName');
        const channels = document.querySelectorAll('.channel');

        // Login functionality
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            username = usernameInput.value.trim();
            if (username) {
                displayUsername.textContent = username;
                userAvatar.textContent = username.charAt(0).toUpperCase();
                loginModal.style.display = 'none';
                app.style.display = 'flex';
                connectWebSocket();
            }
        });

        // Channel switching
        channels.forEach(channel => {
            channel.addEventListener('click', () => {
                channels.forEach(ch => ch.classList.remove('active'));
                channel.classList.add('active');
                currentChannel = channel.dataset.channel;
                currentChannelName.textContent = currentChannel;
                messageInput.placeholder = `#${currentChannel} kanalına mesaj gönder`;
                messages.innerHTML = '';
            });
        });

        // WebSocket connection
        function connectWebSocket() {
            try {
                // Updated WebSocket URL for Go server
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws`;
                
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('WebSocket bağlantısı kuruldu');
                    reconnectAttempts = 0;
                    addSystemMessage(`${username} sohbete katıldı!`);
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        displayMessage(data);
                    } catch (error) {
                        console.error('Mesaj parse hatası:', error);
                        // Fallback for plain text messages
                        displayMessage({
                            username: 'Anonim',
                            message: event.data,
                            timestamp: new Date(),
                            channel: currentChannel
                        });
                    }
                };

                ws.onclose = (event) => {
                    console.log('WebSocket bağlantısı kapandı', event);
                    addSystemMessage('Bağlantı koptu...');
                    
                    // Reconnection logic
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        addSystemMessage(`Yeniden bağlanmaya çalışılıyor... (${reconnectAttempts}/${maxReconnectAttempts})`);
                        setTimeout(() => {
                            connectWebSocket();
                        }, 2000 * reconnectAttempts); // Exponential backoff
                    } else {
                        addSystemMessage('Bağlantı kurulamadı. Sayfa yenileniyor...');
                        setTimeout(() => location.reload(), 3000);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket hatası:', error);
                    addSystemMessage('Bağlantı hatası oluştu.');
                };
            } catch (error) {
                console.error('WebSocket bağlantısı kurulamadı:', error);
                addSystemMessage('Sunucuya bağlanılamadı. Lütfen daha sonra tekrar deneyin.');
            }
        }

        // Send message
        function sendMessage() {
            const message = messageInput.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                try {
                    const messageData = {
                        username: username,
                        message: message,
                        timestamp: new Date(),
                        channel: currentChannel
                    };
                    
                    ws.send(JSON.stringify(messageData));
                    messageInput.value = '';
                } catch (error) {
                    console.error('Mesaj gönderme hatası:', error);
                    addSystemMessage('Mesaj gönderilemedi. Bağlantı kontrol ediliyor...');
                }
            } else if (!ws || ws.readyState !== WebSocket.OPEN) {
                addSystemMessage('Bağlantı kesildi. Yeniden bağlanmaya çalışılıyor...');
                connectWebSocket();
            }
        }

        // Display message
        function displayMessage(data) {
            if (data.channel && data.channel !== currentChannel) {
                return; // Don't show messages from other channels
            }

            const messageElement = document.createElement('div');
            messageElement.className = 'message';

            const timestamp = new Date(data.timestamp);
            const timeString = timestamp.toLocaleTimeString('tr-TR', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            messageElement.innerHTML = `
                <div class="message-avatar">${data.username.charAt(0).toUpperCase()}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${data.username}</span>
                        <span class="message-timestamp">Bugün ${timeString}</span>
                    </div>
                    <div class="message-text">${escapeHtml(data.message)}</div>
                </div>
            `;

            messages.appendChild(messageElement);
            messages.scrollTop = messages.scrollHeight;
        }

        // Add system message
        function addSystemMessage(message) {
            const messageElement = document.createElement('div');
            messageElement.className = 'message';
            messageElement.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">Sistem</span>
                        <span class="message-timestamp">Bugün ${new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                    <div class="message-text">${message}</div>
                </div>
            `;
            messages.appendChild(messageElement);
            messages.scrollTop = messages.scrollHeight;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Auto-focus username input
        usernameInput.focus();
    </script>
</body>
</html>
